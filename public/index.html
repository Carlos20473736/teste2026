<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Young Money - Missões Diárias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== MAIN CARD ===== */
    .mission-card {
      width: 100%;
      max-width: 420px;
      margin: 20px;
      background: #0f0f1e;
      border-radius: 24px;
      border: 1px solid rgba(139, 92, 246, 0.15);
      box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.08);
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .mission-header {
      padding: 28px 24px 20px;
    }
    .mission-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .mission-title {
      font-size: 26px;
      font-weight: 800;
      font-style: italic;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .id-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .id-badge:hover { background: rgba(255,255,255,0.15); }
    .id-badge svg { opacity: 0.7; }
    .mission-subtitle {
      font-size: 13px;
      color: #64748b;
      font-weight: 400;
    }

    /* ===== CONTENT ===== */
    .mission-content {
      padding: 0 24px 24px;
    }

    /* ===== TASK ROW ===== */
    .task-row {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .task-row:last-of-type { border-bottom: none; }
    .task-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .task-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .task-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .task-icon.green {
      background: rgba(0, 220, 170, 0.12);
      border: 1px solid rgba(0, 220, 170, 0.25);
    }
    .task-icon.cyan {
      background: rgba(34, 211, 238, 0.12);
      border: 1px solid rgba(34, 211, 238, 0.25);
    }
    .task-label {
      font-size: 15px;
      font-weight: 600;
      color: #00DCAA;
    }
    .task-label.cyan-text { color: #22d3ee; }
    .task-count {
      font-size: 18px;
      font-weight: 700;
      color: #e2e8f0;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #1e1e2e;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .progress-bar-fill.green {
      background: linear-gradient(90deg, #00DCAA, #10B981);
      box-shadow: 0 0 8px rgba(0, 220, 170, 0.4);
    }
    .progress-bar-fill.cyan {
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
    }

    /* ===== STATS CARDS ===== */
    .stats-row {
      display: flex;
      gap: 12px;
      margin: 20px 0;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .stat-value.green-text { color: #00DCAA; }
    .stat-value.cyan-text { color: #22d3ee; }
    .stat-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
    }

    /* ===== WATCH AD BUTTON ===== */
    .watch-ad-btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #7C3AED 0%, #6366F1 30%, #3B82F6 60%, #06B6D4 100%);
      color: #ffffff;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
      position: relative;
      overflow: hidden;
    }
    .watch-ad-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .watch-ad-btn:hover::before { left: 100%; }
    .watch-ad-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.45);
    }
    .watch-ad-btn:active { transform: translateY(0); }
    .watch-ad-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .watch-ad-btn .play-icon {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== HINT TEXT ===== */
    .hint-text {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 14px;
    }

    /* ===== TASK COMPLETE OVERLAY ===== */
    .task-complete-banner {
      display: none;
      background: linear-gradient(135deg, rgba(0, 220, 170, 0.1), rgba(16, 185, 129, 0.05));
      border: 1px solid rgba(0, 220, 170, 0.2);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      text-align: center;
    }
    .task-complete-banner.show { display: block; }
    .task-complete-banner span {
      color: #00DCAA;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }

    /* ===== LOADING STATE ===== */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #64748b;
      font-size: 14px;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- ===== LOGIN SCREEN STYLES ===== -->
  <style id="login-screen-styles">
    #login-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #060611;
      z-index: 2147483647;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #login-screen .login-bg-particles {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; pointer-events: none;
    }
    #login-screen .login-bg-particles .particle {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: particleFloat 8s ease-in-out infinite;
    }
    #login-screen .login-bg-particles .particle:nth-child(1) { width: 4px; height: 4px; background: #7C3AED; top: 20%; left: 10%; animation-delay: 0s; }
    #login-screen .login-bg-particles .particle:nth-child(2) { width: 6px; height: 6px; background: #00DCAA; top: 60%; left: 80%; animation-delay: 2s; }
    #login-screen .login-bg-particles .particle:nth-child(3) { width: 3px; height: 3px; background: #3B82F6; top: 40%; left: 50%; animation-delay: 4s; }
    #login-screen .login-bg-particles .particle:nth-child(4) { width: 5px; height: 5px; background: #7C3AED; top: 80%; left: 20%; animation-delay: 1s; }
    #login-screen .login-bg-particles .particle:nth-child(5) { width: 4px; height: 4px; background: #00DCAA; top: 10%; left: 70%; animation-delay: 3s; }
    #login-screen .login-bg-particles .particle:nth-child(6) { width: 3px; height: 3px; background: #3B82F6; top: 70%; left: 40%; animation-delay: 5s; }
    @keyframes particleFloat {
      0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
      50% { opacity: 0.6; transform: translateY(-40px) scale(1); }
    }
    #login-screen .login-bg-glow { position: absolute; border-radius: 50%; filter: blur(150px); pointer-events: none; }
    #login-screen .glow-1 { width: 400px; height: 400px; top: -100px; right: -80px; background: rgba(124, 58, 237, 0.12); }
    #login-screen .glow-2 { width: 350px; height: 350px; bottom: -120px; left: -80px; background: rgba(0, 220, 170, 0.08); }
    #login-screen .glow-3 { width: 250px; height: 250px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(59, 130, 246, 0.06); }
    #login-screen .login-card {
      position: relative;
      background: rgba(15, 15, 30, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 28px;
      padding: 52px 44px;
      width: 400px; max-width: 90vw;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(124, 58, 237, 0.08), inset 0 1px 0 rgba(255,255,255,0.03);
      animation: loginSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #login-screen .login-card::before {
      content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 28px; padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), transparent 40%, transparent 60%, rgba(0,220,170,0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    @keyframes loginSlideUp { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    #login-screen .form-label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    #login-screen .login-input-wrap { position: relative; margin-bottom: 28px; }
    #login-screen .login-input {
      width: 100%; padding: 16px 18px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: #f1f5f9; font-size: 15px; font-family: inherit; outline: none;
      transition: all 0.3s ease;
    }
    #login-screen .login-input:focus { border-color: rgba(124, 58, 237, 0.5); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); background: rgba(255,255,255,0.05); }
    #login-screen .login-input::placeholder { color: #374151; }
    #login-screen .login-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7C3AED 0%, #6366F1 50%, #3B82F6 100%);
      color: #ffffff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.02em; position: relative; overflow: hidden;
    }
    #login-screen .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124, 58, 237, 0.45); }
    #login-screen .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #login-screen .login-error {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15);
      color: #fca5a5; padding: 12px 16px; border-radius: 12px; font-size: 13px;
      margin-bottom: 20px; display: none; align-items: center; gap: 8px;
    }
    #login-screen .login-footer { text-align: center; margin-top: 28px; font-size: 11px; color: #374151; }
    .login-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: #ffffff;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
  </style>

  <!-- ===== eCPM HISTORY CLEANER (carregar PRIMEIRO de tudo, no HEAD) ===== -->
  <script src="ecpm-history-cleaner.js"></script>
</head>

<body>
  <!-- ===== LOGIN SCREEN ===== -->
  <div id="login-screen">
    <div class="login-bg-particles">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>
    <div class="login-bg-glow glow-1"></div>
    <div class="login-bg-glow glow-2"></div>
    <div class="login-bg-glow glow-3"></div>
    <div class="login-card">
      <div class="login-error" id="loginError">
        <span id="loginErrorText">YMID inválido</span>
      </div>
      <form id="loginForm" onsubmit="return false;">
        <label class="form-label" data-i18n="yourYmid">Seu YMID</label>
        <div class="login-input-wrap">
          <input type="text" class="login-input" id="loginYmid" placeholder="Digite seu YMID" data-i18n-placeholder="enterYmid" required autocomplete="off" autofocus style="font-family: 'Share Tech Mono', monospace; letter-spacing: 0.05em;" />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span id="loginBtnText" data-i18n="enter">Entrar</span>
          <div class="login-spinner" id="loginSpinner"></div>
        </button>
      </form>
      <div class="login-footer" data-i18n="loginFooter">Insira o YMID que aparece no seu app Young Money.</div>
    </div>
  </div>

  <!-- ===== MISSION CARD (hidden until logged in) ===== -->
  <div class="mission-card" id="missionCard" style="display: none;">
    <!-- Header -->
    <div class="mission-header">
      <div class="mission-header-top">
        <span class="mission-title" data-i18n="dailyMission">Missão Diária</span>
        <div class="id-badge" id="idBadge" title="Editar YMID">
          <span id="idDisplay">ID: ---</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </div>
      </div>
      <p class="mission-subtitle" data-i18n="completeTasksBelow">Complete as tarefas abaixo para desbloquear suas recompensas</p>
    </div>

    <!-- Content -->
    <div class="mission-content">
      <!-- Task Complete Banner -->
      <div class="task-complete-banner" id="taskCompleteBanner">
        <span data-i18n="taskComplete">TAREFA CONCLUÍDA!</span>
      </div>

      <!-- Anúncios Assistidos -->
      <div class="task-row">
        <div class="task-info">
          <div class="task-left">
            <div class="task-icon green">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00DCAA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </div>
            <span class="task-label" data-i18n="adsWatched">Anúncios Assistidos</span>
          </div>
          <span class="task-count"><span id="adsCount">0</span>/20</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill green" id="adsProgress" style="width: 0%"></div>
        </div>
      </div>

      <!-- Cliques Realizados -->
      <div class="task-row">
        <div class="task-info">
          <div class="task-left">
            <div class="task-icon cyan">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122M5.98 11.95l-2.121 2.122"></path>
              </svg>
            </div>
            <span class="task-label cyan-text" data-i18n="clicksDone2">Cliques Realizados</span>
          </div>
          <span class="task-count"><span id="clicksCount">0</span>/2</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill cyan" id="clicksProgress" style="width: 0%"></div>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value green-text" id="totalImpressions">0</div>
          <div class="stat-label" data-i18n="totalImpressions">Total de Impressões</div>
        </div>
        <div class="stat-card">
          <div class="stat-value cyan-text" id="totalClicks">0</div>
          <div class="stat-label" data-i18n="totalClicks">Total de Cliques</div>
        </div>
      </div>

      <!-- Watch Ad Button -->
      <button class="watch-ad-btn" id="watchAdBtn">
        <div class="play-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </div>
        <span data-i18n="watchAd">ASSISTIR ANÚNCIO</span>
      </button>

      <p class="hint-text" id="adStatusText">Verificando carregamento do anúncio...</p>
    </div>
  </div>

  <!-- ===== MISSION SCREEN LOGIC (must be before login logic) ===== -->
  <script>
    var API_BASE_URL = 'https://monetag-postback-server-production.up.railway.app/api/stats/user/';
    var POSTBACK_URL = 'https://monetag-postback-server-production.up.railway.app/api/postback';
    var ZONE_ID = '10873424';
    var MAX_IMPRESSIONS = 20;
    var MAX_CLICKS = 2;
    var __lastPostbackTime = 0;
    var __lastPostbackType = '';
    var __adInProgress = false;
    var __watchBtnResetTimer = 0;
    var __lastGestureTriggerTime = 0;
    var __adStatusWatcherStarted = false;
    var __originalUA = navigator.userAgent || '';
    var __legacyAdDeviceInfo = detectLegacyAdDevice(__originalUA);

    function detectLegacyAdDevice(ua) {
      ua = ua || '';
      var androidMatch = ua.match(/Android\s([0-9.]+)/i);
      var chromeMatch = ua.match(/Chrome\/([0-9]+)/i);
      var androidVersion = androidMatch ? parseFloat(androidMatch[1]) : null;
      var chromeVersion = chromeMatch ? parseInt(chromeMatch[1], 10) : null;
      var isSamsungJ4 = /SM-J4|SM-J41|SM-J415/i.test(ua);
      var isLegacyAndroid = androidVersion && androidVersion <= 9.9;
      var isLegacyChrome = chromeVersion && chromeVersion < 90;
      return {
        ua: ua,
        androidVersion: androidVersion,
        chromeVersion: chromeVersion,
        isSamsungJ4: isSamsungJ4,
        requiresDirectGesture: !!(isSamsungJ4 || isLegacyAndroid || isLegacyChrome)
      };
    }

    function requiresDirectAdGesture() {
      return !!(__legacyAdDeviceInfo && __legacyAdDeviceInfo.requiresDirectGesture);
    }

    function updateWatchAdButtonLabel(label, resetDelay) {
      var btn = document.getElementById('watchAdBtn');
      if (!btn) return;
      var span = btn.querySelector('span[data-i18n="watchAd"]') || btn.querySelector('span');
      if (!span) return;
      if (!span.dataset.defaultLabel) span.dataset.defaultLabel = span.textContent;
      span.textContent = label;
      clearTimeout(__watchBtnResetTimer);
      if (resetDelay !== false) {
        __watchBtnResetTimer = setTimeout(function() {
          span.textContent = span.dataset.defaultLabel || 'ASSISTIR ANÚNCIO';
        }, typeof resetDelay === 'number' ? resetDelay : 1800);
      }
    }

    function updateAdStatusText(message, tone) {
      var el = document.getElementById('adStatusText');
      if (!el) return;
      el.textContent = message;
      if (tone === 'ready') el.style.color = '#34d399';
      else if (tone === 'error') el.style.color = '#f87171';
      else if (tone === 'loading') el.style.color = '#fbbf24';
      else el.style.color = '';
    }

    function refreshAdStatusText() {
      var sdkName = 'show_10873424';
      if (window[sdkName]) {
        updateAdStatusText('Anúncio carregado corretamente. Ao tocar em ASSISTIR ANÚNCIO ele deve abrir.', 'ready');
        return true;
      }
      updateAdStatusText('Verificando carregamento do anúncio... aguarde.', 'loading');
      return false;
    }

    function startAdStatusWatcher() {
      if (__adStatusWatcherStarted) return;
      __adStatusWatcherStarted = true;
      var checks = 0;
      refreshAdStatusText();
      var watcher = setInterval(function() {
        checks++;
        if (refreshAdStatusText()) {
          clearInterval(watcher);
        } else if (checks >= 40) {
          clearInterval(watcher);
          updateAdStatusText('Anúncio ainda não carregou. Aguarde alguns segundos e confira se o status muda para carregado.', 'error');
          __adStatusWatcherStarted = false;
        }
      }, 500);

    function handleWatchAdGesture(e, source) {
      var now = Date.now();
      if (__lastGestureTriggerTime && (now - __lastGestureTriggerTime < 1200)) return;
      __lastGestureTriggerTime = now;
      if (e && typeof e.preventDefault === 'function') e.preventDefault();
      triggerAd({ userGesture: true, source: source || 'watch_button' });
    }

    if (requiresDirectAdGesture()) {
      console.log('[AD] Compatibilidade especial ativada para Android antigo/Samsung J4+: gesto direto obrigatório');
    }


    // ===== SEND POSTBACK =====
    function sendPostback(eventType) {
      var now = Date.now();
      // Anti-duplicação: ignorar se mesmo tipo de evento em menos de 25 segundos
      if (now - __lastPostbackTime < 25000 && __lastPostbackType === eventType) {
        console.log('[POSTBACK] Ignorando ' + eventType + ' - duplicado (menos de 25s desde o ultimo ' + eventType + ')');
        return;
      }
      __lastPostbackTime = now;
      __lastPostbackType = eventType;

      var userId = localStorage.getItem('user_id') || '';
      var userEmail = localStorage.getItem('user_email') || '';
      // ===== PREÇO REAL do Monetag =====
      // Usa o estimated_price REAL capturado do SDK do Monetag.
      // Se não tiver preço real ainda, usa fallback.
      var price;
      if (window.__lastRealMonetagPrice && window.__lastRealMonetagPrice > 0) {
        price = window.__lastRealMonetagPrice.toFixed(6);
        console.log('[POSTBACK] Usando preço REAL do Monetag: $' + price);
      } else {
        price = eventType === 'click' ? '0.0045' : '0.0023';
        console.log('[POSTBACK] Preço real não disponível, usando fallback: $' + price);
      }

      var params = new URLSearchParams({
        event_type: eventType,
        zone_id: ZONE_ID,
        ymid: userId,
        user_email: userEmail,
        estimated_price: price
      });

      console.log('[POSTBACK] Enviando ' + eventType + '...');
      fetch(POSTBACK_URL + '?' + params.toString(), { method: 'GET', mode: 'cors' })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          console.log('[POSTBACK] ' + eventType + ' enviado com sucesso:', data);
          // Atualizar stats após 500ms
          setTimeout(function() {
            var uid = localStorage.getItem('user_id');
            if (uid) fetchStats(uid);
          }, 500);
        })
        .catch(function(err) {
          console.error('[POSTBACK] Erro ao enviar ' + eventType + ':', err);
        });
    }

    function initMissionScreen(userId) {
      var card = document.getElementById('missionCard');
      card.style.display = '';

      // Show ID
      var idDisplay = document.getElementById('idDisplay');
      idDisplay.textContent = 'ID: ' + userId;

      // Edit YMID
      document.getElementById('idBadge').addEventListener('click', function() {
        showYmidEditModal(userId);
      });

      // Fetch stats from API
      fetchStats(userId);
      setInterval(function() { fetchStats(userId); }, 5000);
      startAdStatusWatcher();

      // Watch Ad button
      document.getElementById('watchAdBtn').addEventListener('click', function(e) {
        handleWatchAdGesture(e, 'watch_button_click');
      });
      document.getElementById('watchAdBtn').addEventListener('touchend', function(e) {
        if (e && e.cancelable) e.preventDefault();
        handleWatchAdGesture(e, 'watch_button_touch');
      }, { passive: false });
    }

    function fetchStats(userId) {
      fetch(API_BASE_URL + userId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            var impressions = data.total_impressions || 0;
            var clicks = data.total_clicks || 0;

            document.getElementById('adsCount').textContent = Math.min(impressions, MAX_IMPRESSIONS);
            document.getElementById('clicksCount').textContent = Math.min(clicks, MAX_CLICKS);
            document.getElementById('totalImpressions').textContent = impressions;
            document.getElementById('totalClicks').textContent = clicks;

            var adsPercent = Math.min((impressions / MAX_IMPRESSIONS) * 100, 100);
            var clicksPercent = Math.min((clicks / MAX_CLICKS) * 100, 100);
            document.getElementById('adsProgress').style.width = adsPercent + '%';
            document.getElementById('clicksProgress').style.width = clicksPercent + '%';

            // Task complete check
            if (impressions >= MAX_IMPRESSIONS && clicks >= MAX_CLICKS) {
              document.getElementById('taskCompleteBanner').classList.add('show');
              document.getElementById('watchAdBtn').disabled = true;
              document.getElementById('watchAdBtn').querySelector('span').textContent = window.T ? T('taskComplete') : 'TAREFA CONCLUÍDA!';
            }

            // Click limit overlay
            if (clicks >= MAX_CLICKS && impressions < MAX_IMPRESSIONS) {
              createClickLimitOverlay(clicks);
            }
          }
        })
        .catch(function(err) {
          console.error('[API] Erro:', err);
        });
    }

    // ===== AD TRIGGER (Monetag SDK) =====
    // Flag global: quando true, overlays NUNCA são escondidos
    var clickLimitReached = false;

    function _hideOverlays() {
      // Se o limite de cliques foi atingido, NÃO esconder overlays
      if (clickLimitReached) {
        console.log('[AD] Limite de cliques atingido - overlays permanecem ATIVOS por cima do anúncio');
        return;
      }
      console.log('[AD] Desativando overlays para anúncio...');
      var o1 = document.getElementById('api-click-overlay');
      var o2 = document.getElementById('ad-blocking-layer');
      if (o1) { o1.style.display = 'none'; o1.dataset.adActive = 'true'; }
      if (o2) { o2.style.display = 'none'; o2.dataset.adActive = 'true'; }
    }
    function _showOverlays() {
      console.log('[AD] Reativando overlays...');
      var o1 = document.getElementById('api-click-overlay');
      var o2 = document.getElementById('ad-blocking-layer');
      if (o1) { o1.style.display = 'flex'; o1.dataset.adActive = 'false'; }
      if (o2) { o2.style.display = 'block'; o2.dataset.adActive = 'false'; }
    }

    // ===== SAFETY RESET: evitar que __adInProgress fique preso =====
    // Se __adInProgress ficar true por mais de 30s, resetar automaticamente
    setInterval(function() {
      if (__adInProgress && __adStartTime && (Date.now() - __adStartTime > 30000)) {
        console.warn('[AD] Safety reset: __adInProgress estava preso há 30s+, resetando...');
        __adInProgress = false;
        __adStartTime = 0;
        _showOverlays();
      }
    }, 5000);
    var __adStartTime = 0;
    var __adRetryCount = 0;
    var __maxAdRetries = 3;

    function triggerAd(options) {
      options = options || {};
      var fromUserGesture = !!options.userGesture;
      // Impedir chamadas simultâneas - só um anúncio por vez
      // Mas com safety: se já passou 30s, forçar reset
      if (__adInProgress) {
        if (__adStartTime && (Date.now() - __adStartTime > 30000)) {
          console.warn('[AD] Forçando reset de __adInProgress (preso há 30s+)');
          __adInProgress = false;
          __adStartTime = 0;
        } else {
          console.log('[AD] Anúncio já em andamento, ignorando chamada duplicada');
          return;
        }
      }

      var SDK_NAME = 'show_10873424';
      var userId = localStorage.getItem('user_id') || '';
      var userEmail = localStorage.getItem('user_email') || '';

      if (requiresDirectAdGesture() && !fromUserGesture) {
        console.log('[AD] Tentativa automática bloqueada para preservar o gesto direto no Android antigo');
        __adInProgress = false;
        __adStartTime = 0;
        _showOverlays();
        updateWatchAdButtonLabel('TOQUE PARA ABRIR', 2500);
        updateAdStatusText('Anúncio carregado corretamente. Toque em ASSISTIR ANÚNCIO para abrir.', 'ready');
        return;
      }

      if (!window[SDK_NAME]) {
        console.warn('[AD] SDK não carregado ainda. Aguarde...');
        updateAdStatusText('Anúncio ainda não carregou. Aguarde a confirmação de carregado antes de tocar.', 'error');
        _forceReloadSDK(false);
        if (fromUserGesture && requiresDirectAdGesture()) {
          updateWatchAdButtonLabel('TOQUE NOVAMENTE', 2200);
          return;
        }
        // Tentar carregar e esperar com mais tentativas
        var waitCount = 0;
        var waitInterval = setInterval(function() {
          waitCount++;
          if (window[SDK_NAME]) {
            clearInterval(waitInterval);
            console.log('[AD] SDK carregou após ' + waitCount + ' tentativas');
            triggerAd({ source: 'sdk_wait' });
          } else if (waitCount > 40) {
            clearInterval(waitInterval);
            console.error('[AD] SDK não carregou após 20s de espera. Recarregando SDK...');
            // Forçar recarregamento do SDK
            _forceReloadSDK(!requiresDirectAdGesture());
          }
        }, 500);
        return;
      }

      console.log('[AD] Mostrando anúncio via SDK...');
      updateAdStatusText('Abrindo anúncio...', 'loading');
      __adInProgress = true;
      __adStartTime = Date.now();
      __adRetryCount = 0;
      _hideOverlays();

      var adDone = false;
      // Timeout reduzido para 30s (era 90s) — se não completar, retry
      var adTimeout = setTimeout(function() {
        if (!adDone) {
          console.warn('[AD] Timeout 30s — tentando novamente...');
          adDone = true;
          __adInProgress = false;
          __adStartTime = 0;
          _showOverlays();
          // Auto-retry após timeout
          if (__adRetryCount < __maxAdRetries) {
            __adRetryCount++;
            if (requiresDirectAdGesture()) {
              console.log('[AD] Retry automático desativado em Android antigo; aguardando novo toque do usuário');
              updateWatchAdButtonLabel('TOQUE NOVAMENTE', 2500);
            } else {
              console.log('[AD] Retry automático #' + __adRetryCount);
              setTimeout(function() { triggerAd({ source: 'timeout_retry' }); }, 2000);
            }
          }
        }
      }, 30000);

      function _adSuccess() {
        if (adDone) return;
        adDone = true;
        clearTimeout(adTimeout);
        __adInProgress = false;
        __adStartTime = 0;
        __adRetryCount = 0;
        console.log('[AD] Anúncio completado! Enviando postback de impressão...');
        updateAdStatusText('Anúncio carregado corretamente. Você já pode tocar novamente quando quiser.', 'ready');
        sendPostback('impression');
        setTimeout(function() {
          _showOverlays();
          var uid = localStorage.getItem('user_id');
          if (uid) fetchStats(uid);
        }, 2000);
      }

      function _adClosed() {
        console.log('[AD] Anúncio fechado pelo usuário.');
        clearTimeout(adTimeout);
        if (!adDone) {
          adDone = true;
          __adInProgress = false;
          __adStartTime = 0;
          updateAdStatusText('Anúncio carregado corretamente. Toque em ASSISTIR ANÚNCIO para abrir novamente.', 'ready');
          setTimeout(function() { _showOverlays(); }, 500);
        }
      }

      function _adError(err) {
        console.error('[AD] Erro:', err);
        clearTimeout(adTimeout);
        adDone = true;
        __adInProgress = false;
        __adStartTime = 0;
        updateAdStatusText('Falha ao carregar o anúncio. Aguarde alguns segundos e tente novamente.', 'error');
        _showOverlays();
        // Auto-retry após erro
        if (__adRetryCount < __maxAdRetries) {
          __adRetryCount++;
          if (requiresDirectAdGesture()) {
            console.log('[AD] Retry automático após erro desativado em Android antigo; aguardando novo toque do usuário');
            updateWatchAdButtonLabel('TOQUE NOVAMENTE', 2500);
          } else {
            console.log('[AD] Retry automático após erro #' + __adRetryCount);
            setTimeout(function() { triggerAd({ source: 'error_retry' }); }, 3000);
          }
        }
      }

      try {
        var result = window[SDK_NAME]({
          ymid: userId,
          requestVar: userEmail,
          onComplete: _adSuccess,
          onClose: _adClosed
        });
        // Se o SDK retornar uma Promise, tratar também
        if (result && typeof result.then === 'function') {
          result.then(function() {
            _adSuccess();
          }).catch(function(err) {
            _adError(err);
          });
        }
      } catch(e) {
        console.log('[AD] Tentando formato alternativo (Promise)...');
        try {
          window[SDK_NAME]().then(function() {
            _adSuccess();
          }).catch(function(err) {
            _adError(err);
          });
        } catch(e2) {
          _adError(e2);
        }
      }
    }

    // ===== FORCE RELOAD SDK =====
    function _forceReloadSDK(autoRetryAfterLoad) {
      if (typeof autoRetryAfterLoad === 'undefined') autoRetryAfterLoad = !requiresDirectAdGesture();
      updateAdStatusText('Recarregando o anúncio... aguarde a confirmação.', 'loading');
      console.log('[AD] Forçando recarregamento do SDK Monetag...');
      var ZONE_ID = '10873424';
      var SDK_URL = 'https://libtl.com/sdk.js';
      // Remover scripts antigos
      document.querySelectorAll('script[src="' + SDK_URL + '"]').forEach(function(s) { s.remove(); });
      // Criar novo script
      var script = document.createElement('script');
      script.src = SDK_URL;
      script.setAttribute('data-zone', ZONE_ID);
      script.setAttribute('data-sdk', 'show_' + ZONE_ID);
      script.async = true;
      script.onload = function() {
        var c = 0;
        var iv = setInterval(function() {
          c++;
          if (window['show_' + ZONE_ID]) {
            clearInterval(iv);
            console.log('[AD] SDK recarregado com sucesso!');
            updateAdStatusText('Anúncio carregado corretamente. Ao tocar em ASSISTIR ANÚNCIO ele deve abrir.', 'ready');
            if (autoRetryAfterLoad) {
              setTimeout(function() { triggerAd({ source: 'sdk_reload' }); }, 1000);
            } else {
              updateWatchAdButtonLabel('TOQUE NOVAMENTE', 2200);
            }
          } else if (c > 30) {
            clearInterval(iv);
            console.error('[AD] SDK não inicializou após recarregamento');
            updateAdStatusText('O anúncio não carregou corretamente ainda. Aguarde e tente de novo.', 'error');
          }
        }, 500);
      };
      script.onerror = function() {
        updateAdStatusText('Falha ao baixar o anúncio. Verifique a conexão e tente novamente.', 'error');
      };
      document.head.appendChild(script);
    }

    var overlayCreated = false;
    function createClickLimitOverlay(totalClicks) {
      if (overlayCreated) return;

  <script>
    (function() {
      'use strict';
      var ZONE_ID = '10873424';
      var SDK_NAME = 'show_' + ZONE_ID;
      var SDK_URL = 'https://libtl.com/sdk.js';
      var MAX_RETRIES = 3;
      var retryCount = 0;
      var sdkLoaded = false;

      if (!window.__safeFetchRoleta) window.__safeFetchRoleta = window.fetch.bind(window);

      function loadMonetagSDK() {
        updateAdStatusText('Verificando carregamento do anúncio... aguarde.', 'loading');
        if (sdkLoaded || window[SDK_NAME]) { sdkLoaded = true; updateAdStatusText('Anúncio carregado corretamente. Ao tocar em ASSISTIR ANÚNCIO ele deve abrir.', 'ready'); return; }
        var existing = document.querySelectorAll('script[src="' + SDK_URL + '"]');
        if (existing.length > 0) {
          var c = 0;
          var iv = setInterval(function() {
            c++;
            if (window[SDK_NAME]) { clearInterval(iv); sdkLoaded = true; updateAdStatusText('Anúncio carregado corretamente. Ao tocar em ASSISTIR ANÚNCIO ele deve abrir.', 'ready'); }
            else if (c > 30) { clearInterval(iv); updateAdStatusText('O anúncio ainda não carregou. Aguarde mais um pouco.', 'error'); }
          }, 500);
          return;
        }

        var script = document.createElement('script');
        script.src = SDK_URL;
        script.setAttribute('data-zone', ZONE_ID);
        script.setAttribute('data-sdk', SDK_NAME);
        script.async = true;

        script.onload = function() {
          var c = 0;
          var iv = setInterval(function() {
            c++;
            if (window[SDK_NAME]) { clearInterval(iv); sdkLoaded = true; console.log('[MONETAG] SDK pronto'); updateAdStatusText('Anúncio carregado corretamente. Ao tocar em ASSISTIR ANÚNCIO ele deve abrir.', 'ready'); }
            else if (c > 30) { clearInterval(iv); retryCount++; if (retryCount < MAX_RETRIES) { updateAdStatusText('O anúncio ainda está carregando. Aguarde...', 'loading'); setTimeout(loadMonetagSDK, 2000); } else { updateAdStatusText('O anúncio não carregou corretamente. Aguarde e tente novamente.', 'error'); } }
          }, 500);
        };
        script.onerror = function() { retryCount++; if (retryCount < MAX_RETRIES) { updateAdStatusText('Falha temporária ao carregar o anúncio. Tentando novamente...', 'loading'); setTimeout(loadMonetagSDK, 3000); } else { updateAdStatusText('Falha ao carregar o anúncio. Tente novamente em instantes.', 'error'); } };
        document.head.appendChild(script);
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadMonetagSDK);
      else loadMonetagSDK();
      setTimeout(function() { if (!window[SDK_NAME] && !sdkLoaded) loadMonetagSDK(); }, 2000);
      setTimeout(function() { if (!window[SDK_NAME] && !sdkLoaded) loadMonetagSDK(); }, 5000);
    })();
  </script>

      function applyTranslations() {
        console.log('[I18N] Aplicando traducoes para: ' + window.currentLang);
        var els = document.querySelectorAll('[data-i18n]');
        for (var i = 0; i < els.length; i++) {
          var k = els[i].getAttribute('data-i18n');
          var txt = T(k);
          if (txt) els[i].textContent = txt;
        }
        var phs = document.querySelectorAll('[data-i18n-placeholder]');
        for (var j = 0; j < phs.length; j++) {
          var pk = phs[j].getAttribute('data-i18n-placeholder');
          var ptxt = T(pk);
          if (ptxt) phs[j].placeholder = ptxt;
        }
        // Atualizar titulo da pagina
        document.title = 'Young Money - ' + T('dailyMission');
      }

      function getCachedLang() {
        try { var l = localStorage.getItem(CACHE_KEY); var ts = localStorage.getItem(CACHE_TS_KEY); if (!l || !ts) return null; if (Date.now() - parseInt(ts,10) > CACHE_HOURS * 3600000) return null; return l; } catch(e) { return null; }
      }
      function setCachedLang(l) { try { localStorage.setItem(CACHE_KEY, l); localStorage.setItem(CACHE_TS_KEY, Date.now().toString()); } catch(e) {} }

      function normalizeLang(langOrCountry) {
        if (!langOrCountry) return 'pt';
        // Se for um country code (2 letras maiusculas), mapear para idioma
        var upper = langOrCountry.toUpperCase();
        if (COUNTRY_TO_LANG[upper]) return COUNTRY_TO_LANG[upper];
        // Se for um lang code
        var c = langOrCountry.split(/[_-]/)[0].toLowerCase();
        if (SUPPORTED_LANGS.indexOf(c) !== -1) return c;
        // Fallback para ingles se nao for portugues
        return 'en';
      }

      // Detectar idioma pela API geo do projeto (puxa IP)
      function detectByGeoAPI(cb) {
        try {
          console.log('[I18N] Detectando idioma via API geo...');
          var xhr = new XMLHttpRequest();
          xhr.open('GET', GEO_API, true);
          xhr.timeout = 5000;
          xhr.onload = function() {
            try {
              var d = JSON.parse(xhr.responseText);
              console.log('[I18N] Resposta geo API:', JSON.stringify(d));
              if (d.success && d.data) {
                // Tentar pelo country code primeiro, depois pelo language
                if (d.data.country_code) {
                  var lang = normalizeLang(d.data.country_code);
                  console.log('[I18N] Pais detectado: ' + d.data.country_code + ' -> idioma: ' + lang);
                  cb(lang); return;
                }
                if (d.data.language) {
                  cb(normalizeLang(d.data.language)); return;
                }
              }
            } catch(e) { console.error('[I18N] Erro ao parsear resposta geo:', e); }
            cb(null);
          };
          xhr.onerror = function() { console.warn('[I18N] Erro na API geo'); cb(null); };
          xhr.ontimeout = function() { console.warn('[I18N] Timeout na API geo'); cb(null); };
          xhr.send();
        } catch(e) { cb(null); }
      }

      // Fallback: detectar pelo navegador
      function detectByBrowser() {
        var navLang = navigator.language || navigator.userLanguage || 'pt';
        return normalizeLang(navLang);
      }

      function detectLanguage() {
        // 1. Verificar cache
        var cached = getCachedLang();
        if (cached && SUPPORTED_LANGS.indexOf(cached) !== -1) {
          currentLang = cached;
          window.currentLang = currentLang;
          applyTranslations();
          console.log('[I18N] Idioma do cache: ' + cached);
        }

        // 2. Detectar pela API geo (IP)
        detectByGeoAPI(function(lang) {
          if (lang && lang !== currentLang) {
            currentLang = lang;
            window.currentLang = currentLang;
            setCachedLang(lang);
            applyTranslations();
            console.log('[I18N] Idioma detectado por IP: ' + lang);
          } else if (!cached) {
            // 3. Fallback: navegador
            currentLang = detectByBrowser();
            window.currentLang = currentLang;
            setCachedLang(currentLang);
            applyTranslations();
            console.log('[I18N] Idioma do navegador: ' + currentLang);
          }
        });
      }

      detectLanguage();
    })();

  <!-- ===== LOGIN LOGIC ===== -->
  <script>
    (function() {
      'use strict';

      // Check if already logged in
      var savedUserId = localStorage.getItem('user_id');
      var savedEmail = localStorage.getItem('user_email');

      if (savedUserId && savedEmail) {
        var loginScreen = document.getElementById('login-screen');
        if (loginScreen) loginScreen.remove();
        var loginStyles = document.getElementById('login-screen-styles');
        if (loginStyles) loginStyles.remove();
        initMissionScreen(savedUserId);
        return;
      }

      // Auto-detect YMID from URL
      var urlParams = new URLSearchParams(window.location.search);
      var urlYmid = urlParams.get('ymid') || urlParams.get('user_id') || urlParams.get('id') || '';
      if (!urlYmid) {
        var pathParts = window.location.pathname.split('/').filter(function(p) { return p.length > 0; });
        if (pathParts.length > 0) {
          var lastPart = pathParts[pathParts.length - 1];
          if (/^\d+$/.test(lastPart)) urlYmid = lastPart;
        }
      }

      if (urlYmid) {
        localStorage.setItem('user_id', urlYmid);
        localStorage.setItem('user_email', urlYmid + '@youngmoney.app');
        localStorage.setItem('user_logged_in', 'true');
        localStorage.setItem('saved_ymid', urlYmid);
        localStorage.setItem('ymid_mode', 'true');
        var loginScreen = document.getElementById('login-screen');
        if (loginScreen) loginScreen.remove();
        initMissionScreen(urlYmid);
        return;
      }

      // Login form handler
      var form = document.getElementById('loginForm');
      var ymidInput = document.getElementById('loginYmid');
      var loginBtn = document.getElementById('loginBtn');
      var loginBtnText = document.getElementById('loginBtnText');
      var loginSpinner = document.getElementById('loginSpinner');
      var loginError = document.getElementById('loginError');
      var loginErrorText = document.getElementById('loginErrorText');

      var rememberedYmid = localStorage.getItem('saved_ymid');
      if (rememberedYmid && ymidInput) ymidInput.value = rememberedYmid;

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var ymid = ymidInput.value.trim();
        if (!ymid || ymid.length < 1) {
          loginError.style.display = 'flex';
          loginErrorText.textContent = window.T ? T('invalidYmidMsg') : 'Por favor, insira um YMID válido.';
          return;
        }
        loginError.style.display = 'none';
        loginBtn.disabled = true;
        loginBtnText.textContent = window.T ? T('entering') : 'Entrando...';
        loginSpinner.style.display = 'inline-block';

        localStorage.setItem('user_id', ymid);
        localStorage.setItem('user_email', ymid + '@youngmoney.app');
        localStorage.setItem('user_logged_in', 'true');
        localStorage.setItem('saved_ymid', ymid);
        localStorage.setItem('ymid_mode', 'true');

        var loginScreen = document.getElementById('login-screen');
        loginScreen.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        loginScreen.style.opacity = '0';
        loginScreen.style.transform = 'scale(1.02)';
        setTimeout(function() { window.location.reload(); }, 400);
      });
    })();
  </script>

  <!-- ===== AD BLOCKING LAYER (após 2 cliques) ===== -->
  <script>
    (function() {
      var MAX_CLICKS = 2;
      var blockingLayerActive = false;
      var checkInterval = null;

      function createBlockingLayer() {
        if (document.getElementById('ad-blocking-layer')) return;
        console.log('[CLICK BLOCKER] Criando camada de bloqueio com z-index máximo...');

        var blockingLayer = document.createElement('div');
        blockingLayer.id = 'ad-blocking-layer';
        blockingLayer.style.cssText = 'position:fixed !important;top:0 !important;left:0 !important;width:100vw !important;height:100vh !important;background:transparent !important;z-index:2147483646 !important;cursor:not-allowed !important;pointer-events:auto !important;';

        ['click','mousedown','mouseup','touchstart','touchend','touchmove','contextmenu','pointerdown','pointerup'].forEach(function(ev) {
          blockingLayer.addEventListener(ev, function(e) {
            e.stopPropagation(); e.stopImmediatePropagation(); e.preventDefault();
            console.log('[CLICK BLOCKER] ' + ev + ' bloqueado pela camada');
            return false;
          }, true);
        });

        // Adicionar ao <html> para ficar acima de tudo
        document.documentElement.appendChild(blockingLayer);
        blockingLayerActive = true;

        // Manter sempre no topo
        function keepBlockerOnTop() {
          var el = document.getElementById('ad-blocking-layer');
          if (!el) return;
          if (el.parentNode !== document.documentElement) {
            document.documentElement.appendChild(el);
          }
          el.style.zIndex = '2147483646';
        }
        setInterval(keepBlockerOnTop, 150);

        // MutationObserver
        var obs = new MutationObserver(function() { keepBlockerOnTop(); });
        obs.observe(document.documentElement, { childList: true, subtree: true });

        // CSS forçado
        if (!document.getElementById('blocker-force-top')) {
          var s = document.createElement('style');
          s.id = 'blocker-force-top';
          s.textContent = '#ad-blocking-layer { position: fixed !important; z-index: 2147483646 !important; pointer-events: auto !important; }';
          document.head.appendChild(s);
        }

        console.log('[CLICK BLOCKER] Camada de bloqueio ativada com MutationObserver');
      }

      function checkClickLimit() {
        var currentClicks = parseInt(localStorage.getItem('ad_clicks_count') || '0');
        if (currentClicks >= MAX_CLICKS && !blockingLayerActive) {
          console.log('[CLICK BLOCKER] Limite de ' + MAX_CLICKS + ' clicks atingido!');
          if (checkInterval) clearInterval(checkInterval);
          createBlockingLayer();
        }
      }

      checkInterval = setInterval(checkClickLimit, 200);
      checkClickLimit();
      setTimeout(checkClickLimit, 500);
      console.log('[CLICK BLOCKER] Sistema de monitoramento iniciado');
    })();
  </script>
