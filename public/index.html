<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Ganhe Recompensas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a14;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container { text-align: center; max-width: 420px; width: 100%; }
    .container > * + * { margin-top: 24px; }
    h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.025em; color: #f1f5f9; }
    .subtitle { font-size: 1rem; color: #64748b; margin-top: 8px; }
    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      text-align: left;
    }
    .card > * + * { margin-top: 16px; }
    .progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .progress-label { font-size: 0.875rem; font-weight: 500; color: #94a3b8; }
    .progress-value { font-size: 0.875rem; font-weight: 700; }
    .progress-bar { width: 100%; height: 10px; background: #1e293b; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease-out; }
    .totals { display: flex; gap: 12px; padding-top: 8px; }
    .total-box { flex: 1; background: #0f172a; border-radius: 12px; padding: 12px; text-align: center; }
    .total-number { font-size: 1.5rem; font-weight: 800; }
    .total-label { font-size: 0.75rem; font-weight: 500; color: #475569; margin-top: 2px; }
    .complete-banner {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      display: none;
    }
    .complete-banner span { font-weight: 700; font-size: 0.875rem; letter-spacing: 0.05em; color: #10b981; }
    .btn {
      width: 100%;
      height: 56px;
      font-size: 1.125rem;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn.complete {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .info-text { font-size: 0.875rem; color: #475569; }
    .ymid-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<!-- ========== TELEGRAM ENV SIMULATOR ========== -->
<script src="/telegram-env.js"></script>

<!-- ========== POSTBACK TRACKER ========== -->
<script src="/postback-tracker.js"></script>

<div class="container">
  <div>
    <h1>Ganhe Recompensas</h1>
    <p class="subtitle">Assista a um anúncio rápido e ganhe pontos</p>
  </div>

  <div class="card">
    <!-- Impressions -->
    <div>
      <div class="progress-row">
        <span class="progress-label">Impressões</span>
        <span class="progress-value" id="imp-value" style="color:#3b82f6">0/20</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="imp-fill" style="width:0%;background:linear-gradient(90deg,#3b82f6,#2563eb)"></div>
      </div>
    </div>

    <!-- Clicks -->
    <div>
      <div class="progress-row">
        <span class="progress-label">Cliques</span>
        <span class="progress-value" id="click-value" style="color:#06b6d4">0/2</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="click-fill" style="width:0%;background:linear-gradient(90deg,#06b6d4,#0891b2)"></div>
      </div>
    </div>

    <!-- Totals -->
    <div class="totals">
      <div class="total-box">
        <div class="total-number" id="total-imp" style="color:#3b82f6">0</div>
        <div class="total-label">Total Impressões</div>
      </div>
      <div class="total-box">
        <div class="total-number" id="total-click" style="color:#06b6d4">0</div>
        <div class="total-label">Total Cliques</div>
      </div>
    </div>

    <!-- Complete Banner -->
    <div class="complete-banner" id="complete-banner">
      <span>TAREFA CONCLUÍDA!</span>
    </div>
  </div>

  <button class="btn" id="ad-btn" onclick="handleShowAd()">Assistir Anúncio</button>

  <p class="info-text">Clique no botão acima para assistir a um anúncio e ganhar sua recompensa</p>

  <div>
    <span class="ymid-badge">YMID: <span id="ymid-display">847</span></span>
  </div>
</div>

<script>
(function() {
  'use strict';

  var YMID = '847';
  var MAX_IMPRESSIONS = 20;
  var MAX_CLICKS = 2;
  var loading = false;

  // Set YMID
  localStorage.setItem('user_id', YMID);
  localStorage.setItem('user_email', YMID + '@youngmoney.app');
  document.getElementById('ymid-display').textContent = YMID;

  // Load SDK
  setTimeout(function() {
    var s = document.createElement('script');
    s.src = '//libtl.com/sdk.js';
    s.setAttribute('data-zone', '10670317');
    s.setAttribute('data-sdk', 'show_10670317');
    s.async = true;
    document.head.appendChild(s);
  }, 100);

  // Update UI
  function updateUI(impressions, clicks, totalImp, totalClk) {
    var impPct = Math.min((impressions / MAX_IMPRESSIONS) * 100, 100);
    var clkPct = Math.min((clicks / MAX_CLICKS) * 100, 100);
    var taskDone = totalImp >= MAX_IMPRESSIONS && totalClk >= MAX_CLICKS;

    document.getElementById('imp-value').textContent = impressions + '/' + MAX_IMPRESSIONS;
    document.getElementById('imp-value').style.color = impPct >= 100 ? '#10b981' : '#3b82f6';
    document.getElementById('imp-fill').style.width = impPct + '%';
    document.getElementById('imp-fill').style.background = impPct >= 100
      ? 'linear-gradient(90deg,#10b981,#059669)' : 'linear-gradient(90deg,#3b82f6,#2563eb)';

    document.getElementById('click-value').textContent = clicks + '/' + MAX_CLICKS;
    document.getElementById('click-value').style.color = clkPct >= 100 ? '#10b981' : '#06b6d4';
    document.getElementById('click-fill').style.width = clkPct + '%';
    document.getElementById('click-fill').style.background = clkPct >= 100
      ? 'linear-gradient(90deg,#10b981,#059669)' : 'linear-gradient(90deg,#06b6d4,#0891b2)';

    document.getElementById('total-imp').textContent = totalImp;
    document.getElementById('total-click').textContent = totalClk;

    var btn = document.getElementById('ad-btn');
    var banner = document.getElementById('complete-banner');

    if (taskDone) {
      banner.style.display = 'block';
      btn.disabled = true;
      btn.textContent = 'Tarefa Concluída';
      btn.classList.add('complete');
    } else {
      banner.style.display = 'none';
    }
  }

  // Fetch stats
  function fetchStats() {
    if (!window.__postbackTracker) return;
    window.__postbackTracker.fetchStats(YMID, function(data) {
      if (data && data.success) {
        updateUI(
          Math.min(data.total_impressions || 0, MAX_IMPRESSIONS),
          Math.min(data.total_clicks || 0, MAX_CLICKS),
          data.total_impressions || 0,
          data.total_clicks || 0
        );
      }
    });
  }

  fetchStats();
  setInterval(fetchStats, 5000);
  window.addEventListener('postback-sent', function() { setTimeout(fetchStats, 800); });

  // Show Ad
  window.handleShowAd = function() {
    if (loading) return;
    loading = true;
    var btn = document.getElementById('ad-btn');
    btn.textContent = 'Carregando...';
    btn.disabled = true;

    if (window.__postbackTracker) window.__postbackTracker.markAdStart();

    if (typeof window.show_10670317 === 'function') {
      var result;
      try { result = window.show_10670317(); } catch(e) {
        console.error('Erro:', e);
        resetBtn();
        return;
      }
      if (result && typeof result.then === 'function') {
        result.then(function() {
          if (window.__postbackTracker) window.__postbackTracker.sendPostback('impression');
          resetBtn();
          setTimeout(fetchStats, 1000);
        }).catch(function(err) {
          console.error('Erro:', err);
          resetBtn();
        });
      } else {
        if (window.__postbackTracker) window.__postbackTracker.sendPostback('impression');
        resetBtn();
        setTimeout(fetchStats, 1000);
      }
    } else {
      alert('Anúncio não carregado. Tente novamente.');
      resetBtn();
    }
  };

  function resetBtn() {
    loading = false;
    if (window.__postbackTracker) window.__postbackTracker.markAdEnd();
    var btn = document.getElementById('ad-btn');
    btn.textContent = 'Assistir Anúncio';
    btn.disabled = false;
  }
})();
</script>

</body>
</html>
